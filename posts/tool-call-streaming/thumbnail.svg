<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title description">
  <title id="title">Tool-call streaming comparison</title>
  <desc id="description">OpenAI and llama.cpp returned fine-grained tool-call argument deltas, while the observed SGLang response arrived in larger chunks.</desc>

